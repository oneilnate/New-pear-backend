# foodpod-nginx.conf
# Nginx location blocks for the Food Pod Backend.
# This file is inserted idempotently into the existing server block
# for pear-sandbox.everbetter.com by deploy.sh.
#
# IDEMPOTENT MARKERS — do NOT remove these comments; deploy.sh uses them.
# BEGIN_FOODPOD_NGINX

    # --- Food Pod Backend: API reverse proxy ---
    location /api/ {
        proxy_pass         http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # --- Food Pod Backend: Media files reverse proxy ---
    location /media/ {
        proxy_pass         http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering    on;
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
    }

    # --- Gzip for API responses ---
    gzip             on;
    gzip_types       application/json text/plain application/javascript;
    gzip_min_length  256;
    gzip_proxied     any;

# END_FOODPOD_NGINX

