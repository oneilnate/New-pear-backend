# foodpod-nginx.conf
# Nginx location blocks for the Food Pod Backend.
# This file is inserted idempotently into the existing server block
# for pear-sandbox.everbetter.com by deploy.sh.
#
# IDEMPOTENT MARKERS — do NOT remove these comments; deploy.sh uses them.
# BEGIN_FOODPOD_NGINX

    # --- Food Pod Backend: API reverse proxy ---
    location /api/ {
        proxy_pass         http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # --- Food Pod Backend: Media root (images + any future assets) ---
    # proxy_force_ranges on: nginx synthesises 206 Partial Content responses when the
    # upstream sends Accept-Ranges: bytes + Content-Length (both now returned by the backend).
    # Cache-Control and Accept-Ranges are set by the backend (src/routes/meals.ts) so we do
    # not duplicate them here — nginx passes them through unchanged.
    location /media/ {
        proxy_pass              http://127.0.0.1:8787;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_read_timeout      120s;
        proxy_buffering         on;
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;

        # Enable byte-range support (required for audio seeking / progressive JPEG)
        proxy_force_ranges      on;

        # CORS for Expo web preview (localhost:8081) and expo.dev tunnels
        set $cors_origin "";
        if ($http_origin ~* "^https?://(localhost:8081|127\.0\.0\.1:8081|[^/]+\.expo\.dev)$") {
            set $cors_origin $http_origin;
        }
        add_header Access-Control-Allow-Origin   "$cors_origin"                              always;
        add_header Access-Control-Allow-Methods  "GET, HEAD, OPTIONS"                        always;
        add_header Access-Control-Allow-Headers  "Range, Origin, Accept"                     always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges" always;

        # Handle CORS pre-flight OPTIONS requests
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # --- Food Pod Backend: Audio sub-location (MP3 streaming with seeking) ---
    # More specific than /media/, so nginx matches this block for /media/audio/* requests.
    # Streaming-optimised: proxy_buffering off avoids seek-latency from large buffer accumulation.
    # default_type audio/mpeg ensures correct MIME even if extension detection is absent.
    location /media/audio/ {
        proxy_pass              http://127.0.0.1:8787;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_read_timeout      120s;

        # Disable large buffer accumulation to reduce seek latency
        proxy_buffering         off;

        # Enable byte-range support for audio seeking
        proxy_force_ranges      on;

        # Override MIME to audio/mpeg for all files in this path (.mp3)
        default_type            audio/mpeg;

        # CORS for Expo web preview (localhost:8081) and expo.dev tunnels
        set $cors_origin_audio "";
        if ($http_origin ~* "^https?://(localhost:8081|127\.0\.0\.1:8081|[^/]+\.expo\.dev)$") {
            set $cors_origin_audio $http_origin;
        }
        add_header Access-Control-Allow-Origin   "$cors_origin_audio"                        always;
        add_header Access-Control-Allow-Methods  "GET, HEAD, OPTIONS"                        always;
        add_header Access-Control-Allow-Headers  "Range, Origin, Accept"                     always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges" always;

        # Handle CORS pre-flight OPTIONS requests
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # --- Gzip for API responses ---
    gzip             on;
    gzip_types       application/json text/plain application/javascript;
    gzip_min_length  256;
    gzip_proxied     any;

# END_FOODPOD_NGINX
